name: Dependency Audit

# Transitive-aware vulnerability scan that runs independent of PR activity.
# Renovate's osvVulnerabilityAlerts only alerts on *direct* dependencies, so a
# new advisory against a transitive package (e.g. mermaid's dompurify/uuid)
# could otherwise go unsurfaced between pull requests. `bun audit` scans the
# whole installed tree; a failed scheduled run surfaces the advisory through
# GitHub-native workflow status (and the maintainer's scheduled-failure email).
# The CI `validate` job runs the same gate on every PR; this is the standing,
# PR-independent backstop.

on:
  schedule:
    # Mondays 06:00 UTC — offset from Renovate's weekly lockFileMaintenance so
    # the two don't collide.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies for vulnerabilities
        # Fails on a moderate-or-higher advisory anywhere in the installed tree,
        # including transitive packages. Matches the threshold used by the CI
        # validate job.
        run: bun audit --audit-level=moderate
