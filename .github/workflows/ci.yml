name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies for vulnerabilities
        # Fails the build on a moderate-or-higher advisory against the
        # installed tree, so new advisories surface on the PR rather than by
        # manual `bun audit`. Low-severity advisories are reported but do not
        # block. Renovate (lockFileMaintenance + osvVulnerabilityAlerts) is the
        # primary remediation path; this is the backstop.
        run: bun audit --audit-level=moderate

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run unit and integration tests
        run: bun test

      - name: Run license audit
        run: bun run check:licenses

      - name: Build standalone executable
        run: bun run build

      - name: Smoke-test the compiled binary
        # Catches compile-mode-only bugs the e2e suite misses: it runs in
        # dev mode against tests/e2e/server.ts, not against ./dist/uatu.
        # The feature-folder refactor (PR #57) shipped two such bugs that
        # this smoke would have caught — HTMLBundle chunks falling through
        # to the SPA fallback, and app.ts becoming a lazy __esm() module
        # whose init never ran at boot.
        run: bun run smoke

      - name: Run Playwright end-to-end tests
        run: bun run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

  validate-specs:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate OpenSpec specs and changes
        run: bunx @fission-ai/openspec validate --all --strict
