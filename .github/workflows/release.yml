name: Release

# Release Please creates the version tag and a draft GitHub Release when its
# release PR merges. The dedicated Release Please token allows that tag event
# to trigger this artifact-publication workflow. A rerun rebuilds and replaces
# assets safely; the draft is made public only after every release check passes.
#
# All four platform binaries are cross-compiled on this one Linux runner
# via `bun build --compile --target=...` (uatu has no native modules, so
# this is safe). Asset names and archive layout are a public contract —
# the Homebrew formula and any future installers depend on them.

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Verify tag matches package.json version
        # Fails fast before anything is built: the tag is the single
        # source of truth for what gets released, and it must agree with
        # the version compiled into the binaries.
        run: |
          expected="v$(jq -r .version package.json)"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version ($expected)" >&2
            exit 1
          fi

      - name: Verify GitHub Release exists
        # It is a draft on the first run and may already be published on a
        # full workflow rerun; either state is safe because assets are replaced.
        run: gh release view "$GITHUB_REF_NAME" --json url
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cross-compile all targets
        run: |
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            bun run scripts/build.ts --target="bun-$target" --outfile="dist/$target/uatu"
          done

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Smoke-test the linux-x64 binary
        # The runner is linux-x64, so this artifact — the exact binary
        # being released — can be executed here. A failure stops the
        # release before anything is published.
        run: bun run smoke
        env:
          UATU_SMOKE_BINARY: dist/linux-x64/uatu

      - name: Verify the compiled binary reports the released version
        # Belt and braces on top of the tag guard: asserts the version
        # actually embedded in the artifact (which the Homebrew formula's
        # `test do` block later checks) matches the tag being released.
        run: |
          expected="${GITHUB_REF_NAME#v}"
          reported="$(./dist/linux-x64/uatu --version)"
          echo "binary reports: $reported"
          case "$reported" in
            "v$expected ·"*) ;;
            *)
              echo "::error::Binary reports \"$reported\", expected \"v$expected · <commit>\"" >&2
              exit 1
              ;;
          esac

      - name: Package release assets
        # Contract: zip for darwin, tar.gz for linux, each archive holding
        # a single `uatu` binary at its root (no wrapping directory).
        run: |
          mkdir -p dist/release
          for target in darwin-arm64 darwin-x64; do
            zip -j "dist/release/uatu-$target.zip" "dist/$target/uatu"
          done
          for target in linux-x64 linux-arm64; do
            tar -czf "dist/release/uatu-$target.tar.gz" -C "dist/$target" uatu
          done
          cd dist/release
          sha256sum uatu-* > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/release/uatu-*

      - name: Upload release assets
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            --clobber \
            dist/release/uatu-* dist/release/SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}

  desktop-macos:
    # Builds UatuCode Desktop for both architectures, embedding the darwin
    # binaries the release job just uploaded. Signing and notarization are
    # gated on the Developer ID secrets: with them, signed+stapled app
    # archives join the release and SHA256SUMS; without them (pre-Apple-
    # enrollment) ad-hoc builds land as workflow artifacts only — an
    # unsigned quarantined .app is a support trap, so it never reaches
    # the release itself.
    needs: release
    # The app's deployment target is macOS 26 (SwiftUI WebPage/WebView).
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine signing availability
        id: gate
        # Signing is available only when EVERY secret the signed path needs is
        # present — a partial set (e.g. a rotated notary key) must fall back to
        # the unsigned-artifact path, not fail mid-notarization.
        env:
          CERT: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
        run: |
          if [ -n "$CERT" ] && [ -n "$CERT_PASSWORD" ] && [ -n "$NOTARY_KEY" ] && [ -n "$NOTARY_KEY_ID" ] && [ -n "$NOTARY_ISSUER" ]; then
            echo "signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "signing=false" >> "$GITHUB_OUTPUT"
            if [ -n "$CERT$CERT_PASSWORD$NOTARY_KEY$NOTARY_KEY_ID$NOTARY_ISSUER" ]; then
              echo "::warning::Developer ID signing secrets are only PARTIALLY configured — falling back to ad-hoc workflow artifacts; nothing will be attached to the release"
            else
              echo "::warning::Developer ID secrets not configured — building ad-hoc signed apps as workflow artifacts; nothing will be attached to the release"
            fi
          fi

      - name: Download darwin binaries from the release
        # unzip -d creates only the last path component; dist/ is gitignored
        # and absent on a fresh checkout, so the parents must exist first.
        run: |
          gh release download "$GITHUB_REF_NAME" --pattern "uatu-darwin-*.zip"
          mkdir -p dist/darwin-arm64 dist/darwin-x64
          unzip -o uatu-darwin-arm64.zip -d dist/darwin-arm64
          unzip -o uatu-darwin-x64.zip -d dist/darwin-x64
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build UatuCode Desktop for both architectures
        run: |
          version="${GITHUB_REF_NAME#v}"
          for arch in arm64 x64; do
            xcode_arch="$arch"; [ "$arch" = "x64" ] && xcode_arch="x86_64"
            xcodebuild \
              -project desktop/macos/UatuCodeDesktop.xcodeproj \
              -scheme UatuCodeDesktop \
              -configuration Release \
              -derivedDataPath "desktop/macos/build-$arch" \
              ARCHS="$xcode_arch" ONLY_ACTIVE_ARCH=NO \
              UATU_BINARY="$PWD/dist/darwin-$arch/uatu" \
              MARKETING_VERSION="$version" \
              build
          done

      - name: Sign, notarize, and staple
        if: steps.gate.outputs.signing == 'true'
        uses: ./.github/actions/sign-notarize-app
        with:
          cert-p12: ${{ secrets.MACOS_CERT_P12 }}
          cert-password: ${{ secrets.MACOS_CERT_PASSWORD }}
          notary-key: ${{ secrets.NOTARY_KEY }}
          notary-key-id: ${{ secrets.NOTARY_KEY_ID }}
          notary-issuer: ${{ secrets.NOTARY_ISSUER }}
          arm64-app: desktop/macos/build-arm64/Build/Products/Release/UatuCode Desktop.app
          x64-app: desktop/macos/build-x64/Build/Products/Release/UatuCode Desktop.app
          output-dir: dist/release

      - name: Attest build provenance
        if: steps.gate.outputs.signing == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/release/UatuCode-Desktop-*

      - name: Upload app archives and updated checksums to the release
        if: steps.gate.outputs.signing == 'true'
        run: |
          gh release download "$GITHUB_REF_NAME" --pattern SHA256SUMS --output dist/release/SHA256SUMS.orig
          # Drop stale app entries (rerun safety), then append this build's.
          grep -v "UatuCode-Desktop-" dist/release/SHA256SUMS.orig > dist/release/SHA256SUMS || true
          (cd dist/release && shasum -a 256 UatuCode-Desktop-*.zip >> SHA256SUMS && cat SHA256SUMS)
          gh release upload "$GITHUB_REF_NAME" --clobber \
            dist/release/UatuCode-Desktop-*.zip dist/release/SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Package ad-hoc builds as workflow artifacts
        if: steps.gate.outputs.signing == 'false'
        run: |
          mkdir -p dist/unsigned
          for arch in arm64 x64; do
            ditto -c -k --keepParent \
              "desktop/macos/build-$arch/Build/Products/Release/UatuCode Desktop.app" \
              "dist/unsigned/UatuCode-Desktop-$arch-unsigned.zip"
          done
          echo "### UatuCode Desktop: unsigned build" >> "$GITHUB_STEP_SUMMARY"
          echo "Developer ID secrets are not configured; ad-hoc signed apps were uploaded as workflow artifacts and NOT attached to the release." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unsigned apps as workflow artifacts
        if: steps.gate.outputs.signing == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: uatucode-desktop-unsigned
          path: dist/unsigned/UatuCode-Desktop-*.zip
          retention-days: 14

  publish:
    # The draft release goes public only after every asset that belongs on
    # it — including the desktop apps, when signing is configured — is in
    # place. The desktop job succeeds (without attaching anything) when
    # secrets are absent, so publication is never blocked pre-enrollment.
    needs: [release, desktop-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Publish GitHub Release
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}

  update-tap:
    # Regenerates Formula/uatu.rb — and, when the release carries signed
    # desktop app archives, Casks/uatu-desktop.rb — in tjakobsson/homebrew-tap
    # from the published release's SHA256SUMS. Reads the sums back from the
    # release (not the build directory) so a failed run can be re-run later
    # and still produce the correct output. A failure here never affects the
    # already-published release.
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Download SHA256SUMS from the release
        run: gh release download "$GITHUB_REF_NAME" --pattern SHA256SUMS --output SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew formula and cask
        # HOMEBREW_TAP_TOKEN is a fine-grained PAT with contents:write on
        # tjakobsson/homebrew-tap only. The cask generator exits 2 when the
        # release has no signed app archives (pre-Apple-enrollment releases);
        # the cask is simply left at its previous version then.
        run: |
          version="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/tjakobsson/homebrew-tap.git" tap
          mkdir -p tap/Formula tap/Casks
          bun run scripts/generate-formula.ts --version "$version" --sums SHA256SUMS --out tap/Formula/uatu.rb
          set +e
          bun run scripts/generate-cask.ts --version "$version" --sums SHA256SUMS --out tap/Casks/uatu-desktop.rb
          cask_status=$?
          set -e
          if [ "$cask_status" -ne 0 ] && [ "$cask_status" -ne 2 ]; then
            exit "$cask_status"
          fi
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/uatu.rb Casks/uatu-desktop.rb 2>/dev/null || git add Formula/uatu.rb
          if git diff --cached --quiet; then
            echo "Tap already up to date for uatu $version"
          else
            git commit -m "uatu $version"
            git push origin HEAD
          fi
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
