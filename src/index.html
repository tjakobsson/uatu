<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>uatu</title>
    <base id="preview-base" href="/" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <img class="brand-logo" alt="" width="28" height="28" aria-hidden="true" data-src="/assets/uatu-logo.svg" />
            <div class="brand-text">
              <p class="eyebrow">uatu</p>
              <h1>Codebase Watcher</h1>
            </div>
          </div>
          <button
            id="sidebar-collapse"
            class="icon-button"
            type="button"
            aria-label="Collapse sidebar"
            title="Collapse sidebar"
          >
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M10 3 5 8l5 5"
              />
            </svg>
          </button>
        </div>

        <div class="sidebar-meta">
          <span id="document-count">0 files</span>
          <div class="panels-control">
            <button
              id="panels-toggle"
              class="mini-button"
              type="button"
              aria-expanded="false"
              aria-controls="panels-menu"
              title="Show or hide sidebar panes"
            >
              Panels
            </button>
            <div id="panels-menu" class="panels-menu" hidden></div>
          </div>
        </div>

        <div class="sidebar-body pane-stack">
          <section class="sidebar-pane" data-pane-id="change-overview">
            <header class="pane-header">
              <h2>Change Overview</h2>
              <div class="pane-actions">
                <button class="pane-action" type="button" data-pane-collapse="change-overview" aria-label="Collapse Change Overview" title="Collapse pane">−</button>
                <button class="pane-action" type="button" data-pane-hide="change-overview" aria-label="Hide Change Overview" title="Hide pane">×</button>
              </div>
            </header>
            <div id="change-overview" class="pane-body"></div>
            <div class="pane-resizer" data-pane-resizer="change-overview" role="separator" aria-orientation="horizontal" aria-label="Resize Change Overview"></div>
          </section>
          <section class="sidebar-pane" data-pane-id="files">
            <header class="pane-header">
              <h2>Files</h2>
              <div class="pane-actions">
                <button class="pane-action" type="button" data-pane-collapse="files" aria-label="Collapse Files" title="Collapse pane">−</button>
                <button class="pane-action" type="button" data-pane-hide="files" aria-label="Hide Files" title="Hide pane">×</button>
              </div>
            </header>
            <div class="pane-body">
              <div id="tree" class="tree"></div>
            </div>
            <div class="pane-resizer" data-pane-resizer="files" role="separator" aria-orientation="horizontal" aria-label="Resize Files"></div>
          </section>
          <section class="sidebar-pane" data-pane-id="git-log">
            <header class="pane-header">
              <h2>Git Log</h2>
              <div class="pane-actions">
                <label class="pane-select-label" for="git-log-limit">History</label>
                <select id="git-log-limit" class="pane-select" title="Commit history length">
                  <option value="10">10</option>
                  <option value="25" selected>25</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
                <button class="pane-action" type="button" data-pane-collapse="git-log" aria-label="Collapse Git Log" title="Collapse pane">−</button>
                <button class="pane-action" type="button" data-pane-hide="git-log" aria-label="Hide Git Log" title="Hide pane">×</button>
              </div>
            </header>
            <div id="git-log" class="pane-body"></div>
          </section>
        </div>

        <footer class="sidebar-footer">
          <span id="build-badge" class="build-badge" title="Build identifier"></span>
        </footer>
      </aside>
      <div
        id="sidebar-resizer"
        class="sidebar-resizer"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize sidebar"
        title="Resize sidebar"
      ></div>

      <button
        id="sidebar-expand"
        class="sidebar-rail"
        type="button"
        aria-label="Expand sidebar"
        title="Expand sidebar"
      >
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 3l5 5-5 5"
          />
        </svg>
      </button>

      <main class="preview-shell">
        <header class="preview-header">
          <div class="preview-heading">
            <p class="eyebrow">Preview</p>
            <h2 id="preview-title">No document selected</h2>
            <div class="preview-meta">
              <code id="preview-path">Waiting for viewable files</code>
              <span id="preview-type" class="preview-type" hidden></span>
            </div>
          </div>
          <div class="preview-toolbar" role="group" aria-label="Preview controls">
            <span id="connection-state" class="connection-state" title="Live update channel">
              <span class="indicator-dot" aria-hidden="true"></span>
              <span class="connection-label">Connecting</span>
            </span>
            <button
              id="follow-toggle"
              class="chip-button"
              type="button"
              aria-pressed="true"
              title="Follow the latest changed document"
            >
              <span class="chip-dot" aria-hidden="true"></span>
              <span class="chip-label">Follow</span>
            </button>
            <button
              id="pin-toggle"
              class="chip-button"
              type="button"
              aria-pressed="false"
              aria-label="Pin preview to this file"
              title="Pin preview to this file"
              hidden
            >
              <svg viewBox="0 0 16 16" width="13" height="13" aria-hidden="true" class="chip-icon">
                <path
                  fill="currentColor"
                  d="M10.1 1.3a.5.5 0 0 1 .8 0l3.8 3.8a.5.5 0 0 1 0 .8l-1 1a.5.5 0 0 1-.5.1L11 6.6l-2.4 2.4.5 2.5a.5.5 0 0 1-.2.5l-1 .8a.5.5 0 0 1-.7-.1L4 8.9l-3 3a.6.6 0 0 1-.9-.8l3-3L0 4.7a.5.5 0 0 1-.1-.7l.8-1a.5.5 0 0 1 .5-.2l2.5.5L6.1 1a.5.5 0 0 1 .5-.1l2.2.5 1.3-.1z"
                />
              </svg>
              <span class="chip-label">Pin</span>
            </button>
          </div>
        </header>

        <article id="preview" class="preview markdown-body empty">
          <p>Add a directory with supported documents or save a file to get started.</p>
        </article>
      </main>
    </div>

    <script type="module" src="./app.ts"></script>
  </body>
</html>
